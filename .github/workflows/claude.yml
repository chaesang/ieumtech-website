name: Claude Code

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issues' && contains(github.event.label.name, 'claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'approved')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          label_trigger: "claude"

      - name: Auto-create PR from issue
        id: create-pr
        if: github.event_name == 'issues' && steps.claude.outputs.branch_name != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --repo "${{ github.repository }}" \
            --head "${{ steps.claude.outputs.branch_name }}" \
            --base main \
            --title "${{ github.event.issue.title }}" \
            --body "Closes #${{ github.event.issue.number }}

          Generated with [Claude Code](https://claude.ai/code)")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Resolve PR branch
        id: resolve
        if: always() && steps.claude.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.claude.outputs.branch_name }}"
          PR_NUMBER="${{ steps.create-pr.outputs.pr_number }}"

          # If triggered from a PR comment, get branch from PR
          if [ -z "$BRANCH" ] && [ -n "${{ github.event.issue.pull_request.url || github.event.pull_request.head.ref }}" ]; then
            if [ -n "${{ github.event.pull_request.head.ref }}" ]; then
              BRANCH="${{ github.event.pull_request.head.ref }}"
              PR_NUMBER="${{ github.event.pull_request.number }}"
            else
              # issue_comment on a PR
              PR_NUMBER="${{ github.event.issue.number }}"
              BRANCH=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefName --jq '.headRefName')
            fi
          fi

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Resolved branch: $BRANCH, PR: $PR_NUMBER"

      - name: Take preview screenshots
        if: always() && steps.resolve.outputs.branch != ''
        run: |
          git fetch origin "${{ steps.resolve.outputs.branch }}"
          git checkout "${{ steps.resolve.outputs.branch }}"
          npm install puppeteer serve
          mkdir -p .github/preview
          npx serve . -l 3000 &
          sleep 5
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 900 });
            await page.goto('http://localhost:3000', { waitUntil: 'networkidle0' });
            await page.screenshot({ path: '.github/preview/desktop.png', fullPage: true });
            await page.setViewport({ width: 390, height: 844 });
            await page.goto('http://localhost:3000', { waitUntil: 'networkidle0' });
            await page.screenshot({ path: '.github/preview/mobile.png', fullPage: true });
            await browser.close();
          })();
          "

      - name: Commit and push screenshots
        if: always() && steps.resolve.outputs.branch != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/preview/
          git diff --staged --quiet || (git commit -m "Update preview screenshots" && git push origin "${{ steps.resolve.outputs.branch }}")

      - name: Post preview comment on PR
        if: always() && steps.resolve.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ steps.resolve.outputs.branch }}';
            const prNumber = parseInt('${{ steps.resolve.outputs.pr_number }}');
            if (!branch || !prNumber) {
              console.log('No branch or PR number found');
              return;
            }

            const repo = `${context.repo.owner}/${context.repo.repo}`;
            const ts = Date.now();
            const desktopUrl = `https://raw.githubusercontent.com/${repo}/${branch}/.github/preview/desktop.png?t=${ts}`;
            const mobileUrl = `https://raw.githubusercontent.com/${repo}/${branch}/.github/preview/mobile.png?t=${ts}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(c =>
              c.body && c.body.includes('<!-- preview-screenshot -->')
            );

            const body = [
              '<!-- preview-screenshot -->',
              '## Preview',
              '',
              '### Desktop (1280px)',
              `![Desktop](${desktopUrl})`,
              '',
              '### Mobile (390px)',
              `![Mobile](${mobileUrl})`,
              '',
              `> Commit: \`${process.env.GITHUB_SHA?.slice(0, 7)}\``,
            ].join('\n');

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
