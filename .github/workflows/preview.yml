name: PR Preview Screenshot

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install puppeteer

      - name: Take screenshots
        run: |
          mkdir -p .github/preview
          npx serve . -l 3000 &
          sleep 2
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
            const page = await browser.newPage();

            await page.setViewport({ width: 1280, height: 900 });
            await page.goto('http://localhost:3000', { waitUntil: 'networkidle0' });
            await page.screenshot({ path: '.github/preview/desktop.png', fullPage: true });

            await page.setViewport({ width: 390, height: 844 });
            await page.goto('http://localhost:3000', { waitUntil: 'networkidle0' });
            await page.screenshot({ path: '.github/preview/mobile.png', fullPage: true });

            await browser.close();
          })();
          "

      - name: Commit screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/preview/
          git diff --staged --quiet || git commit -m "Update preview screenshots" && git push

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const repo = `${context.repo.owner}/${context.repo.repo}`;
            const ts = Date.now();
            const desktopUrl = `https://raw.githubusercontent.com/${repo}/${branch}/.github/preview/desktop.png?t=${ts}`;
            const mobileUrl = `https://raw.githubusercontent.com/${repo}/${branch}/.github/preview/mobile.png?t=${ts}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.body && c.body.includes('<!-- preview-screenshot -->')
            );

            const body = [
              '<!-- preview-screenshot -->',
              '## Preview',
              '',
              '### Desktop (1280px)',
              `![Desktop](${desktopUrl})`,
              '',
              '### Mobile (390px)',
              `![Mobile](${mobileUrl})`,
              '',
              `> Commit: ${context.sha.slice(0, 7)}`,
            ].join('\n');

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
