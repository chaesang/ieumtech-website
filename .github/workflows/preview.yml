name: PR Preview Screenshot

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install puppeteer

      - name: Take screenshots
        run: |
          npx serve . -l 3000 &
          sleep 2
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
            const page = await browser.newPage();

            await page.setViewport({ width: 1280, height: 900 });
            await page.goto('http://localhost:3000', { waitUntil: 'networkidle0' });
            await page.screenshot({ path: 'preview-desktop.png', fullPage: true });

            await page.setViewport({ width: 390, height: 844 });
            await page.goto('http://localhost:3000', { waitUntil: 'networkidle0' });
            await page.screenshot({ path: 'preview-mobile.png', fullPage: true });

            await browser.close();
          })();
          "

      - name: Upload screenshots
        id: artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-screenshots
          path: preview-*.png

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.body && c.body.includes('<!-- preview-screenshot -->')
            );

            const body = [
              '<!-- preview-screenshot -->',
              '## 📸 Preview Screenshots',
              '',
              `Desktop (1280px) + Mobile (390px) screenshots available:`,
              '',
              `**[Download screenshots](${runUrl}#artifacts)**`,
              '',
              `> Updated: ${new Date().toISOString()} • Commit: ${context.sha.slice(0, 7)}`,
            ].join('\n');

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
